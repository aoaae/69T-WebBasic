.input-group{
    position:relative;
    margin-bottom:30px;
}

.input-group input{
    width:100%;
    padding:12px 35px 12px 5px;
    border:none;
    border-bottom:2px solid #999;
    background:transparent;
    font-size:15px;
    outline:none; /* ลบเส้นขอบเมื่อ focus */
 
}

.input-group label{
    position:absolute;
    left:5px;
    top:12px;
    color:#999;
    font-size:15px;
    pointer-events:none;
    transition:0.3s ease;
}

/* เมื่อ focus */
.input-group input:focus + label,
.input-group input:valid + label{
    top:-8px;
    font-size:12px;
    color:#6a00ff;
}

/* เปลี่ยนสีเส้นเมื่อ focus */
.input-group input:focus{
    border-bottom:2px solid #6a00ff;
}

.input-group i{
    position:absolute;
    right:0;
    top:12px;
    color:#6a00ff;
}

/* มีข้อความอยู่ */
.input-group input:not(:placeholder-shown) + label{
    top:-8px;
    font-size:12px;
    color:#6a00ff;
}






.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#a044ff,#6a00ff);
    color:#fff;
    font-size:16px;
    cursor:pointer;
    margin-bottom:20px;
    transition:0.3s;
}

.btn:hover{
    opacity:0.9;
}

.social{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.social button{
    width:48%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#e0e0e0;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-size:14px;
}

.links{
    display:flex;
    justify-content:space-between;
    font-size:13px;
}

.links a{
    text-decoration:none;
    color:#6a00ff;
}

.error{
    color:red;
    font-size:13px;
    margin-bottom:10px;
    text-align:center;
    display:none;
}

<div class="input-group">
    <i class="fa-solid fa-at"></i>
    <input type="email" id="email" placeholder=" " required>
    <label>Email</label>
</div>

<div class="input-group">
    <i class="fa-solid fa-lock"></i>
    <input type="password" id="password" placeholder=" " required>
    <label>Password</label>
</div>



    <button class="btn" onclick="login()">Login</button>

    <div class="social">
        <button>
            <i class="fa-brands fa-google"></i> Google
        </button>

        </button>

        <a href="#">Forgot password?</a>
        <a href="#">Sign Up</a>
    </div>
</div>

<script>
function login(){
    const email = document.getElementById("email").value; // ดึงค่าจาก input fields
    const password = document.getElementById("password").value; // ดึงค่าจาก input fields
    const errorMsg = document.getElementById("errorMsg"); // อ้างอิงถึง element แสดงข้อความผิดพลาด

        // กำหนดค่าที่อนุญาต
    const correctEmail = "admin@test.com";
    const correctPassword = "111111";

    // ตัวอย่าง validation แบบง่าย
    if(email === "" || password === ""){
        errorMsg.style.display = "block";
        errorMsg.innerText = "Please fill in all fields";
        return;
    }

    if(password.length < 6){
        errorMsg.style.display = "block"; // แสดงข้อความผิดพลาด
        errorMsg.innerText = "Password must be at least 6 characters";
        return;
    }

    // ตรวจสอบว่าตรงกับค่าที่กำหนดหรือไม่
    if (email === correctEmail && password === correctPassword) {
        errorMsg.style.display = "none"; // ซ่อนข้อความผิดพลาดถ้าตรง
        window.location.href = "ws-blogpost-2.html";
    } else {
        errorMsg.innerText = "Email or Password incorrect"; // แสดงข้อความผิดพลาดถ้าไม่ตรง
        errorMsg.style.display = "block"; // แสดงข้อความผิดพลาด
    }

    //errorMsg.style.display = "none";
    //alert("Login Successful!");
}
</script>
