<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>มหาวิทยาลัยราชภัฏสงขลา</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="logo">NPRU</div>
    <nav class="nav" id="nav">
        <a href="#">หน้าแรก</a>
        <a href="#">เกี่ยวกับมหาวิทยาลัย</a>
        <a href="#">การศึกษา</a>
        <a href="#">ข่าวสาร</a>
        <a href="#">ติดต่อ</a>
    </nav>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
</header>

<main>
    <!-- Slider -->
    <section class="slider">
        <img id="slide" src="images/slide1.jpg" alt="ข่าวสาร">
    </section>
    
    <!-- News -->
    <section class="news">
        <h2>ข่าวสาร / ประกาศ</h2>
        <div class="news-grid">
            <div class="card">
                <h3>ประกาศมหาวิทยาลัย</h3>
                <p>ข่าวสารและประกาศอย่างเป็นทางการ</p>
            </div>
            <div class="card">
                <h3>กิจกรรม</h3>
                <p>กิจกรรมสำหรับนักศึกษาและบุคลากร</p>
            </div>
            <div class="card">
                <h3>รับสมัครนักศึกษา</h3>
                <p>ข้อมูลการรับสมัครนักศึกษาใหม่</p>
            </div>
        </div>
    </section>
</main>

<footer class="footer">
    <p>มหาวิทยาลัยราชภัฏนครปฐม</p>
    <p>© 2026 Nakhon Pathom Rajabhat University</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
